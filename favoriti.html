		body{

		}
		.flex-container{
			display: flex;
			flex-direction: row;
			flex-wrap: wrap;
		}
		.albums > div{
			width: 100%;
			padding: 10px;
			background-color: #181818;
			cursor: pointer;
			flex: 20%;
			margin: 1%;
		}
		.albums > div:hover{
			background-color: #282828;
		}
		.albums > div > a{
			text-decoration: none;
			color: white;
			transition: 1s;
			width: 100%;
			background-color: #181818;
		}
		.albums > div > a > img{
			width: 100%;
		}
		#album{
			padding: 1%;
		}
		h1{
			font-size: 25px;
		}
		h2{
			font-size: 20px;
		}
		
		@media screen and (max-width: 767px){
			.flex-container{
				display: flex
				flex-direction: column;
				flex-wrap: wrap;
			}
			.albums > div{
				flex: 48%;
				margin: 1%;
			}
		}

		}
		footer > a{

			color: #fff;
			font-weight: bold;
			transition: 0.5s;
		}
		footer > a:hover{
			opacity: 0.7;
		}
	</style>
</head>
